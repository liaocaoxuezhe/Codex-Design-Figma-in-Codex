<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        margin: 0;
        padding: 16px;
        font-family: Inter, sans-serif;
        color: #171717;
      }
      .status {
        font-size: 13px;
        line-height: 1.5;
      }
      .ok {
        color: #0f7a3a;
      }
      .error {
        color: #b42318;
      }
      code {
        display: block;
        margin-top: 10px;
        padding: 8px;
        background: #f3f3f3;
        border-radius: 6px;
        font-size: 11px;
        white-space: normal;
      }
    </style>
  </head>
  <body>
    <div id="status" class="status">正在同步 Figma 选区...</div>
    <code>Bridge: http://127.0.0.1:38447</code>
    <script>
      const status = document.getElementById("status");
      window.onmessage = (event) => {
        const message = event.data.pluginMessage;
        if (!message) return;
        if (message.ok) {
          status.className = "status ok";
          status.textContent = `已同步 ${message.selectionCount} 个选中节点，时间 ${new Date(message.updatedAt).toLocaleTimeString()}`;
        } else {
          status.className = "status error";
          status.textContent = `同步失败：${message.error}。请先启动本地 Bridge。`;
        }
      };
    </script>
  </body>
</html>
